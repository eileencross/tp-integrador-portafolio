<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - Andie Cruz</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="layout">

  <!-- HEADER -->
  <header>
    <h2>Andie Cruz</h2>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="index.html#proyectos">Primer sitio web</a>
      <a href="contact.html">Contacto</a>
      <a href="https://github.com/eileencross" target="_blank">Mi GitHub</a>
    </nav>
  </header>

  <!-- SIDEBAR -->
  <aside>
    <h3>Contacto</h3>
    <p>Podés escribirme para consultas o propuestas.</p>
  </aside>

  <!-- MAIN -->
  <main>

    <section class="contact">
      <h1>Formulario de Contacto</h1>

      <form>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="Tu nombre" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Tu email" required>
        </div>

        <div class="form-group">
          <label>Mensaje</label>
          <textarea rows="5" placeholder="Escribí tu mensaje..." required></textarea>
        </div>

        <button type="submit">Enviar</button>
      </form>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 - Andie Cruz</p>
  </footer>

</body>
</html>
